name: 'Double Checker'
description: 'AI code review powered by OpenAI Codex. Drop into any repo, get reviews on every PR.'
branding:
  icon: 'check-circle'
  color: 'green'

inputs:
  openai-api-key:
    description: 'OpenAI API key (leave empty when using pre-configured auth)'
    required: false
    default: ''
  model:
    description: 'Model to use for review'
    default: 'gpt-5.4'
  effort:
    description: 'Reasoning effort: none, low, medium, high, xhigh'
    default: 'xhigh'
  severity:
    description: 'Minimum severity to reject: P0, P1, P2, or P3'
    default: 'P0'
  fail-on-reject:
    description: 'Fail the check if the review finds issues at or above the severity threshold'
    default: 'true'

runs:
  using: 'composite'
  steps:
    - name: Install Codex
      shell: bash
      run: |
        if [ "$(uname)" = "Linux" ]; then
          sudo apt-get update -qq && sudo apt-get install -y -qq bubblewrap > /dev/null
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 2>/dev/null || true
        fi
        npm install -g @openai/codex || {
          echo "::error::Failed to install @openai/codex"
          exit 1
        }

    - name: Authenticate
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
      run: |
        if [ -z "$OPENAI_API_KEY" ]; then
          echo "No API key provided — assuming codex is already authenticated"
        else
          echo "$OPENAI_API_KEY" | codex login --with-api-key || {
            echo "::error::Codex authentication failed — check your OpenAI API key"
            exit 1
          }
        fi

    - name: Run review
      shell: bash
      id: review
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
      run: |
        set -eo pipefail
        REVIEW_OUTPUT="$RUNNER_TEMP/double-checker-review.md"

        codex review \
          --base "${{ github.event.pull_request.base.ref || 'main' }}" \
          -c model="${{ inputs.model }}" \
          -c model_reasoning_effort="${{ inputs.effort }}" \
          2>&1 | tee "$REVIEW_OUTPUT"

        if [ ! -s "$REVIEW_OUTPUT" ]; then
          echo "::error::codex review produced no output"
          exit 1
        fi

        # Build severity pattern — match only Codex finding lines (- [P0] ...)
        case "${{ inputs.severity }}" in
          P3) PATTERN='^- \[(P0|P1|P2|P3)\]' ;;
          P2) PATTERN='^- \[(P0|P1|P2)\]' ;;
          P1) PATTERN='^- \[(P0|P1)\]' ;;
          *)  PATTERN='^- \[P0\]' ;;
        esac

        if grep -qE "$PATTERN" "$REVIEW_OUTPUT"; then
          echo "verdict=reject" >> "$GITHUB_OUTPUT"
        else
          echo "verdict=approve" >> "$GITHUB_OUTPUT"
        fi

    - name: Post PR review
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        VERDICT: ${{ steps.review.outputs.verdict }}
        FAIL_ON_REJECT: ${{ inputs.fail-on-reject }}
      run: |
        # Read review from file — avoids passing large output through env vars
        # which can exceed ARG_MAX and crash the shell
        RAW_OUTPUT="$RUNNER_TEMP/double-checker-review.md"
        REVIEW_FILE="$RUNNER_TEMP/double-checker-review-body.md"
        { printf '## Double Checker Review\n\n'; cat "$RAW_OUTPUT"; printf '\n'; } > "$REVIEW_FILE"

        # GitHub PR review body limit is 65,536 characters — truncate if needed
        MAX_CHARS=65000
        FILE_BYTES=$(wc -c < "$REVIEW_FILE")
        if [ "$FILE_BYTES" -gt "$MAX_CHARS" ]; then
          head -c "$MAX_CHARS" "$REVIEW_FILE" > "${REVIEW_FILE}.tmp"
          printf '\n\n---\n*Review truncated (exceeded GitHub'\''s 65,536 character limit)*\n' >> "${REVIEW_FILE}.tmp"
          mv "${REVIEW_FILE}.tmp" "$REVIEW_FILE"
          echo "::warning::Review body truncated from ${FILE_BYTES} to ~${MAX_CHARS} characters (GitHub limit)"
        fi

        if [ "$VERDICT" = "reject" ]; then
          gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --request-changes \
            --body-file "$REVIEW_FILE" || {
              echo "::error::Failed to post review"
              exit 1
            }

          if [ "$FAIL_ON_REJECT" = "true" ]; then
            echo "::error::Double Checker found critical issues in this PR"
            exit 1
          fi
        else
          # Try --approve first; fall back to --comment if the repo doesn't
          # allow GitHub Actions to approve PRs (the default setting).
          gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --approve \
            --body-file "$REVIEW_FILE" 2>/dev/null \
          || gh pr review "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --comment \
            --body-file "$REVIEW_FILE" || {
              echo "::error::Failed to post review"
              exit 1
            }
        fi
